<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} – {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script>
    (function() {
      var t = localStorage.getItem('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <nav>
    <div class="logo">Picaro.dev</div>
    <div class="nav-right">
      <ul>
        <li><a href="{{ '/' | relative_url }}">Home</a></li>
        <li><a href="{{ '/blog' | relative_url }}">Blog</a></li>
      </ul>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">☀️</button>
    </div>
  </nav>
  <main>
    {{ content }}
  </main>
  <footer>
    &copy; {{ site.time | date: '%Y' }} Picaro.dev
  </footer>
  <script>
    (function() {
      var btn = document.getElementById('themeToggle');
      function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        btn.textContent = theme === 'clear' ? '🌙' : '☀️';
      }
      var current = localStorage.getItem('theme') || '';
      if (current === 'clear') btn.textContent = '🌙';
      btn.addEventListener('click', function() {
        var now = document.documentElement.getAttribute('data-theme');
        setTheme(now === 'clear' ? '' : 'clear');
        if (now === 'clear') document.documentElement.removeAttribute('data-theme');
      });
    })();
  </script>
</body>
</html>
