<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" font-family="'Courier New', monospace">
  <defs>
    <filter id="g2">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="350" fill="#000" rx="8"/>

  <text x="400" y="32" fill="#0f0" font-size="16" font-weight="bold" text-anchor="middle" filter="url(#g2)">CHAT MODE vs AGENT MODE</text>
  <line x1="200" y1="42" x2="600" y2="42" stroke="#0f0" stroke-width="1" opacity="0.4"/>

  <!-- CHAT MODE (left) -->
  <rect x="30" y="60" width="360" height="270" rx="10" fill="none" stroke="#ff0" stroke-width="2"/>
  <rect x="30" y="60" width="360" height="270" rx="10" fill="rgba(255,255,0,0.03)"/>
  <text x="210" y="88" fill="#ff0" font-size="14" text-anchor="middle" font-weight="bold">CHAT MODE</text>
  <text x="210" y="104" fill="#aa0" font-size="9" text-anchor="middle">you copy-paste, you run, you fix</text>

  <text x="55" y="130" fill="#aa0" font-size="10">1.</text>
  <text x="72" y="130" fill="#ff0" font-size="10">You ask a question</text>
  <text x="55" y="155" fill="#aa0" font-size="10">2.</text>
  <text x="72" y="155" fill="#ff0" font-size="10">AI suggests code</text>
  <text x="55" y="180" fill="#aa0" font-size="10">3.</text>
  <text x="72" y="180" fill="#ff0" font-size="10">You copy it into your file</text>
  <text x="55" y="205" fill="#aa0" font-size="10">4.</text>
  <text x="72" y="205" fill="#ff0" font-size="10">You run the code yourself</text>
  <text x="55" y="230" fill="#aa0" font-size="10">5.</text>
  <text x="72" y="230" fill="#ff0" font-size="10">It fails, you paste the error</text>
  <text x="55" y="255" fill="#aa0" font-size="10">6.</text>
  <text x="72" y="255" fill="#ff0" font-size="10">AI suggests a fix</text>
  <text x="55" y="280" fill="#aa0" font-size="10">7.</text>
  <text x="72" y="280" fill="#ff0" font-size="10">You repeat steps 3-6...</text>

  <text x="210" y="315" fill="#f00" font-size="10" text-anchor="middle" font-weight="bold">MANUAL LOOP</text>

  <!-- AGENT MODE (right) -->
  <rect x="410" y="60" width="360" height="270" rx="10" fill="none" stroke="#0f0" stroke-width="2"/>
  <rect x="410" y="60" width="360" height="270" rx="10" fill="rgba(0,255,0,0.03)"/>
  <text x="590" y="88" fill="#0f0" font-size="14" text-anchor="middle" font-weight="bold">AGENT MODE</text>
  <text x="590" y="104" fill="#0a0" font-size="9" text-anchor="middle">agent writes, runs, fixes - you review</text>

  <text x="435" y="130" fill="#0a0" font-size="10">1.</text>
  <text x="452" y="130" fill="#0f0" font-size="10">You describe the task</text>
  <text x="435" y="155" fill="#0a0" font-size="10">2.</text>
  <text x="452" y="155" fill="#0f0" font-size="10">Agent reads your codebase</text>
  <text x="435" y="180" fill="#0a0" font-size="10">3.</text>
  <text x="452" y="180" fill="#0f0" font-size="10">Agent writes the code</text>
  <text x="435" y="205" fill="#0a0" font-size="10">4.</text>
  <text x="452" y="205" fill="#0f0" font-size="10">Agent runs and tests it</text>
  <text x="435" y="230" fill="#0a0" font-size="10">5.</text>
  <text x="452" y="230" fill="#0f0" font-size="10">Agent fixes any errors</text>
  <text x="435" y="255" fill="#0a0" font-size="10">6.</text>
  <text x="452" y="255" fill="#0f0" font-size="10">Agent commits the result</text>
  <text x="435" y="280" fill="#0a0" font-size="10">7.</text>
  <text x="452" y="280" fill="#0f0" font-size="10">You review the PR</text>

  <text x="590" y="315" fill="#0f0" font-size="10" text-anchor="middle" font-weight="bold">AUTONOMOUS LOOP</text>
</svg>
