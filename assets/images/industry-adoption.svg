<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="'Courier New', monospace">
  <defs>
    <filter id="gi"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="320" fill="#000" rx="8"/>
  <text x="400" y="28" fill="#0f0" font-size="14" font-weight="bold" text-anchor="middle" filter="url(#gi)">INDUSTRY: HAND-CODED LOGIC REPLACED BY LEARNED SYSTEMS</text>
  <line x1="140" y1="38" x2="660" y2="38" stroke="#0f0" stroke-width="1" opacity="0.3"/>

  <!-- Tesla -->
  <rect x="30" y="55" width="230" height="68" rx="6" fill="none" stroke="#f00" stroke-width="1.5"/>
  <text x="145" y="75" fill="#f00" font-size="11" text-anchor="middle" font-weight="bold">TESLA FSD v12</text>
  <text x="145" y="92" fill="#a00" font-size="8" text-anchor="middle">300,000 lines C++ deleted</text>
  <text x="145" y="106" fill="#a00" font-size="8" text-anchor="middle">End-to-end neural net from video</text>
  <text x="145" y="118" fill="#600" font-size="7" text-anchor="middle">~2,000 lines remain</text>

  <!-- Google -->
  <rect x="280" y="55" width="230" height="68" rx="6" fill="none" stroke="#ff0" stroke-width="1.5"/>
  <text x="395" y="75" fill="#ff0" font-size="11" text-anchor="middle" font-weight="bold">GOOGLE SEARCH</text>
  <text x="395" y="92" fill="#aa0" font-size="8" text-anchor="middle">RankBrain + DeepRank replaced</text>
  <text x="395" y="106" fill="#aa0" font-size="8" text-anchor="middle">100s of hand-tuned ranking factors</text>
  <text x="395" y="118" fill="#770" font-size="7" text-anchor="middle">Daily model rollouts vs weekly manual</text>

  <!-- Netflix -->
  <rect x="530" y="55" width="240" height="68" rx="6" fill="none" stroke="#f0f" stroke-width="1.5"/>
  <text x="650" y="75" fill="#f0f" font-size="11" text-anchor="middle" font-weight="bold">NETFLIX</text>
  <text x="650" y="92" fill="#a0a" font-size="8" text-anchor="middle">Collaborative filtering to transformers</text>
  <text x="650" y="106" fill="#a0a" font-size="8" text-anchor="middle">User history as token sequences</text>
  <text x="650" y="118" fill="#707" font-size="7" text-anchor="middle">80%+ of viewing from ML recs</text>

  <!-- X -->
  <rect x="30" y="140" width="230" height="68" rx="6" fill="none" stroke="#0f0" stroke-width="1.5" filter="url(#gi)"/>
  <rect x="30" y="140" width="230" height="68" rx="6" fill="rgba(0,255,0,0.04)"/>
  <text x="145" y="160" fill="#0f0" font-size="11" text-anchor="middle" font-weight="bold">X (TWITTER)</text>
  <text x="145" y="177" fill="#0a0" font-size="8" text-anchor="middle">Scala + 30 models to Grok transformer</text>
  <text x="145" y="191" fill="#0a0" font-size="8" text-anchor="middle">Zero hand-engineered features</text>
  <text x="145" y="203" fill="#060" font-size="7" text-anchor="middle">Rust + JAX/Haiku, Jan 2026</text>

  <!-- YouTube -->
  <rect x="280" y="140" width="230" height="68" rx="6" fill="none" stroke="#0ff" stroke-width="1.5"/>
  <text x="395" y="160" fill="#0ff" font-size="11" text-anchor="middle" font-weight="bold">YOUTUBE</text>
  <text x="395" y="177" fill="#088" font-size="8" text-anchor="middle">Two-stage deep learning</text>
  <text x="395" y="191" fill="#088" font-size="8" text-anchor="middle">~1B params, 100s of billions examples</text>
  <text x="395" y="203" fill="#055" font-size="7" text-anchor="middle">Replaced editorial curation (2016)</text>

  <!-- Spotify + Amazon -->
  <rect x="530" y="140" width="115" height="68" rx="6" fill="none" stroke="#f80" stroke-width="1.5"/>
  <text x="587" y="160" fill="#f80" font-size="10" text-anchor="middle" font-weight="bold">SPOTIFY</text>
  <text x="587" y="177" fill="#a60" font-size="7" text-anchor="middle">CNN on raw audio</text>
  <text x="587" y="191" fill="#a60" font-size="7" text-anchor="middle">+ collaborative</text>
  <text x="587" y="203" fill="#740" font-size="7" text-anchor="middle">filtering + NLP</text>

  <rect x="655" y="140" width="115" height="68" rx="6" fill="none" stroke="#0f0" stroke-width="1.5"/>
  <text x="712" y="160" fill="#0f0" font-size="10" text-anchor="middle" font-weight="bold">AMAZON</text>
  <text x="712" y="177" fill="#0a0" font-size="7" text-anchor="middle">Item-to-item CF</text>
  <text x="712" y="191" fill="#0a0" font-size="7" text-anchor="middle">to deep autoencoders</text>
  <text x="712" y="203" fill="#060" font-size="7" text-anchor="middle">"once-in-a-decade"</text>

  <!-- Pattern -->
  <rect x="80" y="230" width="640" height="40" rx="6" fill="rgba(0,255,0,0.06)" stroke="#0f0" stroke-width="1"/>
  <text x="400" y="255" fill="#0f0" font-size="10" text-anchor="middle" font-weight="bold">PATTERN: hand-engineered features + rules yield to end-to-end learned systems</text>

  <!-- Conditions -->
  <text x="140" y="295" fill="#0a0" font-size="8" text-anchor="middle">High-dimensional inputs</text>
  <text x="320" y="295" fill="#0a0" font-size="8" text-anchor="middle">Sufficient training data</text>
  <text x="500" y="295" fill="#0a0" font-size="8" text-anchor="middle">Non-linear relationships</text>
  <text x="680" y="295" fill="#0a0" font-size="8" text-anchor="middle">Probabilistic &gt; brittle rules</text>
  <circle cx="55" cy="291" r="3" fill="#0f0"/>
  <circle cx="240" cy="291" r="3" fill="#0f0"/>
  <circle cx="415" cy="291" r="3" fill="#0f0"/>
  <circle cx="600" cy="291" r="3" fill="#0f0"/>
</svg>
