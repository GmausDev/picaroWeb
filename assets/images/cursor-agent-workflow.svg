<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Courier New', monospace">
  <defs>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" fill="#000" rx="8"/>

  <text x="400" y="35" fill="#0f0" font-size="18" font-weight="bold" text-anchor="middle" filter="url(#glow2)">CURSOR AGENT WORKFLOW</text>
  <line x1="220" y1="45" x2="580" y2="45" stroke="#0f0" stroke-width="1" opacity="0.5"/>

  <!-- Step 1: EXPLORE -->
  <rect x="310" y="65" width="180" height="55" rx="8" fill="none" stroke="#0f0" stroke-width="2" filter="url(#glow2)"/>
  <rect x="310" y="65" width="180" height="55" rx="8" fill="rgba(0,255,0,0.05)"/>
  <text x="400" y="88" fill="#0f0" font-size="13" text-anchor="middle" font-weight="bold">1. EXPLORE</text>
  <text x="400" y="108" fill="#0a0" font-size="9" text-anchor="middle">read codebase &amp; understand</text>

  <!-- Step 2: CODE -->
  <rect x="560" y="155" width="180" height="55" rx="8" fill="none" stroke="#0ff" stroke-width="2" filter="url(#glow2)"/>
  <rect x="560" y="155" width="180" height="55" rx="8" fill="rgba(0,255,255,0.05)"/>
  <text x="650" y="178" fill="#0ff" font-size="13" text-anchor="middle" font-weight="bold">2. CODE</text>
  <text x="650" y="198" fill="#088" font-size="9" text-anchor="middle">write &amp; edit files</text>

  <!-- Step 3: RUN -->
  <rect x="500" y="270" width="180" height="55" rx="8" fill="none" stroke="#ff0" stroke-width="2" filter="url(#glow2)"/>
  <rect x="500" y="270" width="180" height="55" rx="8" fill="rgba(255,255,0,0.05)"/>
  <text x="590" y="293" fill="#ff0" font-size="13" text-anchor="middle" font-weight="bold">3. RUN</text>
  <text x="590" y="313" fill="#aa0" font-size="9" text-anchor="middle">build &amp; execute</text>

  <!-- Step 4: VERIFY -->
  <rect x="120" y="270" width="180" height="55" rx="8" fill="none" stroke="#f80" stroke-width="2" filter="url(#glow2)"/>
  <rect x="120" y="270" width="180" height="55" rx="8" fill="rgba(255,136,0,0.05)"/>
  <text x="210" y="293" fill="#f80" font-size="13" text-anchor="middle" font-weight="bold">4. VERIFY</text>
  <text x="210" y="313" fill="#a60" font-size="9" text-anchor="middle">test &amp; check results</text>

  <!-- Step 5: SHIP -->
  <rect x="60" y="155" width="180" height="55" rx="8" fill="none" stroke="#f0f" stroke-width="2" filter="url(#glow2)"/>
  <rect x="60" y="155" width="180" height="55" rx="8" fill="rgba(255,0,255,0.05)"/>
  <text x="150" y="178" fill="#f0f" font-size="13" text-anchor="middle" font-weight="bold">5. SHIP</text>
  <text x="150" y="198" fill="#a0a" font-size="9" text-anchor="middle">commit &amp; push</text>

  <!-- Arrows: 1 to 2 -->
  <line x1="490" y1="100" x2="560" y2="160" stroke="#0f0" stroke-width="2"/>
  <polygon points="556,155 564,163 552,163" fill="#0ff"/>

  <!-- Arrows: 2 to 3 -->
  <line x1="650" y1="210" x2="620" y2="270" stroke="#0ff" stroke-width="2"/>
  <polygon points="616,265 624,273 613,270" fill="#ff0"/>

  <!-- Arrows: 3 to 4 -->
  <line x1="500" y1="297" x2="300" y2="297" stroke="#ff0" stroke-width="2"/>
  <polygon points="305,292 295,297 305,302" fill="#f80"/>

  <!-- Arrows: 4 to 5 -->
  <line x1="180" y1="270" x2="160" y2="210" stroke="#f80" stroke-width="2"/>
  <polygon points="155,215 163,207 167,217" fill="#f0f"/>

  <!-- Arrows: 5 to 1 -->
  <line x1="200" y1="155" x2="310" y2="100" stroke="#f0f" stroke-width="2"/>
  <polygon points="305,96 314,97 308,105" fill="#0f0"/>

  <!-- Center label -->
  <text x="400" y="215" fill="#0f0" font-size="11" text-anchor="middle" font-weight="bold" filter="url(#glow2)">ITERATE</text>
  <text x="400" y="230" fill="#0a0" font-size="9" text-anchor="middle">until correct</text>

  <!-- Debug loop: 4 to 2 -->
  <path d="M 300,285 L 400,240 L 560,175" fill="none" stroke="#f00" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <polygon points="556,172 564,175 557,180" fill="#f00" opacity="0.7"/>
  <text x="420" y="256" fill="#f00" font-size="8" opacity="0.7">fix bugs</text>

  <!-- Bottom label -->
  <text x="400" y="360" fill="#0a0" font-size="10" text-anchor="middle">// autonomous closed-loop development</text>
  <text x="400" y="380" fill="#060" font-size="9" text-anchor="middle">powered by Cursor Cloud Agent</text>
</svg>
