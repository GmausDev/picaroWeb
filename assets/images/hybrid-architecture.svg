<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="'Courier New', monospace">
  <defs>
    <filter id="gh"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="360" fill="#000" rx="8"/>
  <text x="400" y="28" fill="#0f0" font-size="14" font-weight="bold" text-anchor="middle" filter="url(#gh)">THE EXPANDING STACK: WHERE EACH PARADIGM APPLIES</text>
  <line x1="170" y1="38" x2="630" y2="38" stroke="#0f0" stroke-width="1" opacity="0.3"/>

  <!-- Software 1.0 Column -->
  <rect x="25" y="55" width="240" height="250" rx="8" fill="none" stroke="#0f0" stroke-width="2"/>
  <rect x="25" y="55" width="240" height="17" rx="8" fill="rgba(0,255,0,0.15)"/>
  <text x="145" y="68" fill="#0f0" font-size="10" text-anchor="middle" font-weight="bold">SOFTWARE 1.0: EXPLICIT RULES</text>

  <text x="42" y="95" fill="#0f0" font-size="9" font-weight="bold">Best for:</text>
  <text x="42" y="115" fill="#0a0" font-size="8">API routing + authentication</text>
  <text x="42" y="132" fill="#0a0" font-size="8">Database queries + migrations</text>
  <text x="42" y="149" fill="#0a0" font-size="8">Regulatory compliance logic</text>
  <text x="42" y="166" fill="#0a0" font-size="8">Safety-critical constraints</text>
  <text x="42" y="183" fill="#0a0" font-size="8">Deterministic business rules</text>
  <text x="42" y="200" fill="#0a0" font-size="8">Auditability requirements</text>

  <text x="42" y="228" fill="#0f0" font-size="9" font-weight="bold">Why:</text>
  <text x="42" y="248" fill="#060" font-size="8">Traceable, testable, auditable</text>
  <text x="42" y="265" fill="#060" font-size="8">"Why did it decide this?"</text>
  <text x="42" y="282" fill="#060" font-size="8">has a concrete answer</text>

  <!-- Software 2.0 Column -->
  <rect x="280" y="55" width="240" height="250" rx="8" fill="none" stroke="#0ff" stroke-width="2"/>
  <rect x="280" y="55" width="240" height="17" rx="8" fill="rgba(0,255,255,0.15)"/>
  <text x="400" y="68" fill="#0ff" font-size="10" text-anchor="middle" font-weight="bold">SOFTWARE 2.0: LEARNED MODELS</text>

  <text x="297" y="95" fill="#0ff" font-size="9" font-weight="bold">Best for:</text>
  <text x="297" y="115" fill="#088" font-size="8">Recommendation + ranking</text>
  <text x="297" y="132" fill="#088" font-size="8">Visual recognition + perception</text>
  <text x="297" y="149" fill="#088" font-size="8">Speech recognition</text>
  <text x="297" y="166" fill="#088" font-size="8">Fraud detection + anomaly</text>
  <text x="297" y="183" fill="#088" font-size="8">Translation + NLU</text>
  <text x="297" y="200" fill="#088" font-size="8">Autonomous planning</text>

  <text x="297" y="228" fill="#0ff" font-size="9" font-weight="bold">Why:</text>
  <text x="297" y="248" fill="#055" font-size="8">Too complex for explicit rules</text>
  <text x="297" y="265" fill="#055" font-size="8">High-dimensional input spaces</text>
  <text x="297" y="282" fill="#055" font-size="8">Learns patterns from data</text>

  <!-- Software 3.0 Column -->
  <rect x="535" y="55" width="240" height="250" rx="8" fill="none" stroke="#f0f" stroke-width="2"/>
  <rect x="535" y="55" width="240" height="17" rx="8" fill="rgba(255,0,255,0.15)"/>
  <text x="655" y="68" fill="#f0f" font-size="10" text-anchor="middle" font-weight="bold">SOFTWARE 3.0: LLM PROMPTS</text>

  <text x="552" y="95" fill="#f0f" font-size="9" font-weight="bold">Best for:</text>
  <text x="552" y="115" fill="#a0a" font-size="8">Natural language interfaces</text>
  <text x="552" y="132" fill="#a0a" font-size="8">Flexible reasoning chains</text>
  <text x="552" y="149" fill="#a0a" font-size="8">Content generation</text>
  <text x="552" y="166" fill="#a0a" font-size="8">Code generation + analysis</text>
  <text x="552" y="183" fill="#a0a" font-size="8">Multi-modal understanding</text>
  <text x="552" y="200" fill="#a0a" font-size="8">Agent-based workflows</text>

  <text x="552" y="228" fill="#f0f" font-size="9" font-weight="bold">Why:</text>
  <text x="552" y="248" fill="#707" font-size="8">General-purpose reasoning</text>
  <text x="552" y="265" fill="#707" font-size="8">Adapts via prompt, not retrain</text>
  <text x="552" y="282" fill="#707" font-size="8">Handles novel, open-ended tasks</text>

  <!-- Bottom -->
  <rect x="80" y="320" width="640" height="28" rx="6" fill="rgba(0,255,0,0.06)" stroke="#0f0" stroke-width="1"/>
  <text x="400" y="339" fill="#0f0" font-size="9" text-anchor="middle" font-weight="bold">KEY SKILL: knowing which paradigm to apply where = the defining capability of next-gen system designers</text>
</svg>
