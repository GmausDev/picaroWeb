<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="'Courier New', monospace">
  <defs>
    <filter id="gp"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="340" fill="#000" rx="8"/>
  <text x="400" y="30" fill="#0f0" font-size="15" font-weight="bold" text-anchor="middle" filter="url(#gp)">KARPATHY'S THREE SOFTWARE PARADIGMS</text>
  <line x1="180" y1="40" x2="620" y2="40" stroke="#0f0" stroke-width="1" opacity="0.3"/>

  <!-- 1.0 -->
  <rect x="30" y="60" width="230" height="220" rx="8" fill="none" stroke="#0f0" stroke-width="2" filter="url(#gp)"/>
  <rect x="30" y="60" width="230" height="220" rx="8" fill="rgba(0,255,0,0.04)"/>
  <text x="145" y="88" fill="#0f0" font-size="14" text-anchor="middle" font-weight="bold">SOFTWARE 1.0</text>
  <line x1="50" y1="95" x2="240" y2="95" stroke="#0f0" stroke-width="0.5" opacity="0.3"/>
  <text x="145" y="118" fill="#0a0" font-size="10" text-anchor="middle">Explicit instructions</text>
  <text x="55" y="145" fill="#0f0" font-size="9">Unit: function / class</text>
  <text x="55" y="165" fill="#0f0" font-size="9">Tool: compiler / IDE</text>
  <text x="55" y="185" fill="#0f0" font-size="9">Debug: line-by-line</text>
  <text x="55" y="205" fill="#0f0" font-size="9">Output: deterministic</text>
  <text x="55" y="235" fill="#0a0" font-size="8">if score &gt; threshold:</text>
  <text x="55" y="250" fill="#0a0" font-size="8">    return "relevant"</text>
  <text x="145" y="272" fill="#0f0" font-size="9" text-anchor="middle" font-weight="bold">Human writes logic</text>

  <!-- Arrow 1.0 to 2.0 -->
  <line x1="260" y1="170" x2="280" y2="170" stroke="#0ff" stroke-width="2"/>
  <polygon points="280,165 290,170 280,175" fill="#0ff"/>

  <!-- 2.0 -->
  <rect x="290" y="60" width="230" height="220" rx="8" fill="none" stroke="#0ff" stroke-width="2" filter="url(#gp)"/>
  <rect x="290" y="60" width="230" height="220" rx="8" fill="rgba(0,255,255,0.04)"/>
  <text x="405" y="88" fill="#0ff" font-size="14" text-anchor="middle" font-weight="bold">SOFTWARE 2.0</text>
  <line x1="310" y1="95" x2="500" y2="95" stroke="#0ff" stroke-width="0.5" opacity="0.3"/>
  <text x="405" y="118" fill="#088" font-size="10" text-anchor="middle">Neural network weights</text>
  <text x="315" y="145" fill="#0ff" font-size="9">Unit: weight matrix</text>
  <text x="315" y="165" fill="#0ff" font-size="9">Tool: gradient descent</text>
  <text x="315" y="185" fill="#0ff" font-size="9">Debug: data + metrics</text>
  <text x="315" y="205" fill="#0ff" font-size="9">Output: probabilistic</text>
  <text x="315" y="235" fill="#088" font-size="8">model = train(data,</text>
  <text x="315" y="250" fill="#088" font-size="8">    loss_fn, epochs)</text>
  <text x="405" y="272" fill="#0ff" font-size="9" text-anchor="middle" font-weight="bold">Machine learns logic</text>

  <!-- Arrow 2.0 to 3.0 -->
  <line x1="520" y1="170" x2="540" y2="170" stroke="#f0f" stroke-width="2"/>
  <polygon points="540,165 550,170 540,175" fill="#f0f"/>

  <!-- 3.0 -->
  <rect x="550" y="60" width="220" height="220" rx="8" fill="none" stroke="#f0f" stroke-width="2" filter="url(#gp)"/>
  <rect x="550" y="60" width="220" height="220" rx="8" fill="rgba(255,0,255,0.04)"/>
  <text x="660" y="88" fill="#f0f" font-size="14" text-anchor="middle" font-weight="bold">SOFTWARE 3.0</text>
  <line x1="570" y1="95" x2="750" y2="95" stroke="#f0f" stroke-width="0.5" opacity="0.3"/>
  <text x="660" y="118" fill="#a0a" font-size="10" text-anchor="middle">Natural language prompts</text>
  <text x="575" y="145" fill="#f0f" font-size="9">Unit: prompt</text>
  <text x="575" y="165" fill="#f0f" font-size="9">Tool: LLM API</text>
  <text x="575" y="185" fill="#f0f" font-size="9">Debug: prompt tuning</text>
  <text x="575" y="205" fill="#f0f" font-size="9">Output: generative</text>
  <text x="575" y="235" fill="#a0a" font-size="8">"Rank these posts</text>
  <text x="575" y="250" fill="#a0a" font-size="8"> by user relevance"</text>
  <text x="660" y="272" fill="#f0f" font-size="9" text-anchor="middle" font-weight="bold">Human describes intent</text>

  <!-- Timeline -->
  <text x="145" y="310" fill="#060" font-size="8" text-anchor="middle">1950s - present</text>
  <text x="405" y="310" fill="#055" font-size="8" text-anchor="middle">2012 - present</text>
  <text x="660" y="310" fill="#505" font-size="8" text-anchor="middle">2022 - present</text>
  <text x="400" y="332" fill="#0a0" font-size="8" text-anchor="middle">// "automates what you can specify" ... "automates what you can verify" ... "automates what you can describe"</text>
</svg>
